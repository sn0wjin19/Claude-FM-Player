<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; media-src 'self';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude FM</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <div class="controls" aria-label="Claude FM controls">
        <button
          id="playToggle"
          class="play-toggle"
          type="button"
          aria-label="加载中"
          title="加载中"
          disabled
        >
          <i data-lucide="loader-circle" aria-hidden="true"></i>
        </button>
        <div class="volume-control" title="音量">
          <button
            id="volumeIcon"
            class="volume-icon"
            type="button"
            aria-label="静音"
            title="静音"
          >
            <i data-lucide="volume-2"></i>
          </button>
          <input
            id="volumeSlider"
            class="volume-slider"
            type="range"
            min="0"
            max="100"
            value="20"
            aria-label="音量"
          />
        </div>
        <button
          id="loginButton"
          class="icon-button"
          type="button"
          aria-label="登录 YouTube"
          title="登录 YouTube"
        >
          <i data-lucide="user-round" aria-hidden="true"></i>
        </button>
      </div>
      <div id="loginPopover" class="pixel-popover" role="status" hidden>
        已登录 不用重复登录咯~
      </div>
      <p id="status" class="status" aria-live="polite">正在寻找 Claude FM</p>
      <audio id="audio" preload="none"></audio>
    </main>
    <script src="./vendor/lucide.min.js"></script>
    <script src="./vendor/motion.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
